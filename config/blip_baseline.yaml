run_name: blip_baseline

data:
  train_path: data/splits/train.parquet
  val_path: data/splits/val.parquet
  test_path: data/splits/test.parquet
  output_dir: outputs
  log_dir: logs

training:
  batch_size: 16
  epochs: 16
  learning_rates: [0.0001, 0.00005, 0.00001]
  scenarios: ["Normal", "Augmentasi", "SMOTE", "Aug_SMOTE"]
  seed: 42
  num_workers: 2

model:
  name: blip_baseline
  pretrained_name: Salesforce/blip2-opt-2.7b
  hidden_dim: 256
  dropout: 0.3
  num_classes: null

output:
  root_dir: outputs
  save_confusion_matrix: true
  save_classification_report: true
  save_history_json: true