name: Train Extractor Pipeline

on:
  push:
    branches:
      - using-classifier

jobs:
  train:
    runs-on: [self-hosted, linux, x64, classifier]
    timeout-minutes: 4320

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          python --version
          nvidia-smi || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip || true
          pip install -r requirements.txt

      - name: Run training
        run: |
          mkdir -p logs outputs/checkpoints
          cd src
          python train_feature_extractor.py | tee ../logs/extractor_training.log

      - name: Upload logs and outputs
        uses: actions/upload-artifact@v4
        with:
          name: extractor-training-results
          path: |
            logs/
            outputs/
          retention-days: 30
